name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chatuser
          POSTGRES_PASSWORD: chatpassword
          POSTGRES_DB: chatdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: cd ../.. && pnpm install

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://chatuser:chatpassword@localhost:5432/chatdb_test

      - name: Run migrations
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://chatuser:chatpassword@localhost:5432/chatdb_test

      - name: Typecheck
        run: pnpm typecheck
        env:
          DATABASE_URL: postgresql://chatuser:chatpassword@localhost:5432/chatdb_test
          TEST_DATABASE_URL: postgresql://chatuser:chatpassword@localhost:5432/chatdb_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          GEMINI_API_KEY: test
          CLIENT_URL: http://localhost:5173

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://chatuser:chatpassword@localhost:5432/chatdb_test
          TEST_DATABASE_URL: postgresql://chatuser:chatpassword@localhost:5432/chatdb_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          GEMINI_API_KEY: test
          CLIENT_URL: http://localhost:5173

  frontend:
    name: Frontend — Typecheck
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: cd ../.. && pnpm install

      - name: Typecheck
        run: pnpm typecheck